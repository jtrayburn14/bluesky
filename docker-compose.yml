services:
  pipeline:
    build: .
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      # Pointing to Ollama on your host machine
      - OLLAMA_HOST=http://host.docker.internal:11434
    # Keeps the container alive so you can "exec" into it
    tty: true 
    stdin_open: true